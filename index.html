<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CyberDeck v1.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CyberDeck">

<style>
    /* =========================================
       🎨 UIデザインの変更: サイバーパンク・ネオンテーマ
       ========================================= */
    :root {
      --bg-main: #06060c; 
      --panel-bg: rgba(16, 16, 28, 0.75);
      --panel-border: rgba(0, 242, 254, 0.2);
      --bar-glass-bg: rgba(10, 10, 18, 0.8);
      --bar-glass-border: rgba(79, 172, 254, 0.3);
      --accent-color: #00f2fe; /* ネオンシアン */
      --accent-sub: #9b51e0;   /* ネオンパープル */
      --text-main: #ffffff;
      --text-muted: #e0e0e6;
      --text-sub: #707080;
      --btn-main-bg: #00f2fe;
      --btn-main-text: #06060c;
      --item-hover: rgba(0, 242, 254, 0.08);
      --item-active: rgba(0, 242, 254, 0.15);
      --lyrics-dim: rgba(255, 255, 255, 0.2);
      --shadow: 0 0 20px rgba(0, 242, 254, 0.15);
      --glass-blur: blur(25px);
      --hotbar-height: 100px;
      --header-height: 80px;
    }

    /* ライトモードもサイバー風のダーク感を維持（または少しサイバーグリーン調になどアレンジ可能） */
    html[data-theme="dark"] {
      --bg-main: #020205;
      --panel-bg: rgba(8, 8, 14, 0.85);
      --panel-border: rgba(155, 81, 224, 0.3);
      --accent-color: #9b51e0; /* パープルをメインに */
      --shadow: 0 0 25px rgba(155, 81, 224, 0.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
    
    body {
      background-color: var(--bg-main);
      color: var(--text-main);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: background-color 0.4s ease, color 0.4s ease;
    }

    /* 動く背景をネオンカラーのグラデーションに */
    .bg-animate {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
      pointer-events: none;
      background: radial-gradient(circle at 80% 20%, rgba(0, 242, 254, 0.1), transparent 50%),
                  radial-gradient(circle at 20% 80%, rgba(155, 81, 224, 0.1), transparent 50%);
      animation: ambientBg 15s infinite alternate ease-in-out;
    }
    @keyframes ambientBg { 0% { transform: scale(1); } 100% { transform: scale(1.15); } }

    /* スクロールバーもネオンに */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0, 242, 254, 0.2); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent-color); }

    /* 🔒 認証モーダル */
    #authModal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(4, 4, 8, 0.8); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
      display: flex; justify-content: center; align-items: center; z-index: 10000;
    }
    .auth-box {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      padding: 40px; border-radius: 16px; width: 100%; max-width: 400px;
      box-shadow: var(--shadow); text-align: center;
    }
    .auth-subtitle { font-size: 0.85rem; color: var(--text-sub); margin-bottom: 24px; }
    .auth-input {
      width: 100%; padding: 14px; border-radius: 8px;
      border: 1px solid rgba(0, 242, 254, 0.2);
      background: rgba(0, 0, 0, 0.4); color: var(--text-main); font-size: 1rem;
      margin-bottom: 12px; outline: none; transition: all 0.2s;
    }
    .auth-input:focus { border-color: var(--accent-color); box-shadow: 0 0 10px rgba(0, 242, 254, 0.3); }
    .auth-error { color: #ff3b30; font-size: 0.8rem; margin-bottom: 12px; min-height: 18px; text-align: left; }
    
    .btn-primary {
      width: 100%; min-height: 48px; padding: 14px; border: none; border-radius: 8px;
      background: var(--btn-main-bg); color: var(--btn-main-text); font-size: 1.05rem; font-weight: 700;
      letter-spacing: 1px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:hover { box-shadow: 0 0 15px var(--accent-color); }

    /* 🍏 メインレイアウト */
    #appWrap { display: none; flex-direction: column; height: 100vh; width: 100vw; overflow: hidden; }

    header {
      height: var(--header-height); padding: 0 40px; display: flex; justify-content: space-between; align-items: center;
      flex-shrink: 0; z-index: 100; border-bottom: 1px solid rgba(0, 242, 254, 0.1);
    }
    .header-left { display: flex; align-items: center; gap: 24px; }
    .brand-group { display: flex; align-items: center; gap: 10px; }
    /* タイトルにSF風フォントを適用 */
    .brand-title { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; font-weight: 900; letter-spacing: 1px; color: var(--accent-color); text-shadow: 0 0 10px rgba(0, 242, 254, 0.5); }
    
    .network-badge { font-size: 0.75rem; font-weight: 700; padding: 6px 12px; border-radius: 4px; letter-spacing: 0.5px; display: flex; align-items: center; gap: 6px; }
    .badge-online { background: rgba(0, 242, 254, 0.1); color: #00f2fe; border: 1px solid rgba(0, 242, 254, 0.2); }
    .badge-offline { background: rgba(255, 149, 0, 0.15); color: #ff9500; }

    .btn-theme-circle {
      width: 44px; height: 44px; border-radius: 8px;
      background: var(--panel-bg); border: 1px solid var(--panel-border);
      color: var(--text-main); font-size: 1.2rem; display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.3s ease; box-shadow: var(--shadow);
    }
    .btn-theme-circle:hover { transform: scale(1.05); color: var(--accent-color); border-color: var(--accent-color); }

    main { flex: 1; padding: 0 40px 140px 40px; display: flex; flex-direction: column; overflow: hidden; }
    .view-tab { display: none; width: 100%; height: 100%; flex-direction: column; overflow: hidden; }
    .view-tab.active { display: flex; animation: slideUp 0.3s ease-out; }
    #tab-home, #tab-search, #tab-settings { overflow-y: auto; padding-right: 4px; }
    
    @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    .section-title { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; font-weight: 700; margin-top: 20px; margin-bottom: 24px; color: #ffffff; }

    .pl-panel {
      background: var(--panel-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--panel-border); border-radius: 16px; box-shadow: var(--shadow);
      display: flex; flex-direction: column; overflow: hidden; height: 100%;
    }

    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px; }
    .card { background: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: 12px; padding: 20px; display: flex; align-items: center; gap: 16px; cursor: pointer; transition: all 0.2s; box-shadow: var(--shadow); }
    .card:hover { transform: translateY(-2px); border-color: var(--accent-color); background: var(--item-hover); }
    .card-img { width: 64px; height: 64px; border-radius: 6px; object-fit: cover; }
    .card-info { flex: 1; overflow: hidden; }
    .card-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-desc { font-size: 0.85rem; color: var(--text-sub); }
    .rank-badge { font-family: 'Orbitron', sans-serif; font-size: 1.4rem; font-weight: 900; color: var(--accent-color); width: 30px; text-align: center; text-shadow: 0 0 8px var(--accent-color); }

    .search-bar-container { position: relative; max-width: 600px; margin-bottom: 30px; }
    .search-input { width: 100%; padding: 16px 20px 16px 50px; font-size: 1.1rem; border-radius: 8px; border: 1px solid var(--panel-border); background: rgba(0,0,0,0.3); color: var(--text-main); outline: none; transition: all 0.2s; }
    .search-input:focus { border-color: var(--accent-color); box-shadow: 0 0 15px rgba(0, 242, 254, 0.2); }
    .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-sub); font-size: 1.1rem; }

    /* 🎵 プレイリストビュー (3カラム独立スクロール) */
    .playlist-layout-v06 { display: grid; grid-template-columns: 1fr 1.3fr 1fr; gap: 30px; height: 100%; width: 100%; overflow: hidden; }
    .pl-panel-art { padding: 40px 30px; justify-content: center; align-items: center; }
    .art-mega-wrapper { width: 100%; max-width: 300px; aspect-ratio: 1; margin: 0 auto; border-radius: 12px; overflow: hidden; border: 2px solid rgba(0, 242, 254, 0.2); transition: all 0.4s ease; }
    .playing .art-mega-wrapper { transform: scale(1.02); border-color: var(--accent-color); box-shadow: 0 0 25px rgba(0, 242, 254, 0.3); }
    .art-mega { width: 100%; height: 100%; object-fit: cover; }
    .art-info { text-align: center; margin-top: 24px; width: 100%; }
    .art-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .art-artist { font-size: 1rem; color: var(--accent-color); font-weight: 600; font-family: 'Orbitron', sans-serif; }

    .pl-panel-lyrics { padding: 30px; display: flex; flex-direction: column; }
    .lyrics-header-zone { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-shrink: 0; }
    .list-header { font-family: 'Orbitron', sans-serif; font-size: 0.85rem; font-weight: 700; letter-spacing: 1.5px; color: var(--text-sub); }
    
    .lyrics-box { flex: 1; overflow-y: scroll; padding: 60% 0; scroll-behavior: smooth; }
    .lyrics-box::-webkit-scrollbar { width: 4px; }
    .l-line { font-size: 1.3rem; font-weight: 700; color: var(--lyrics-dim); line-height: 1.6; margin-bottom: 24px; cursor: pointer; transition: all 0.2s ease; }
    .l-line.active { color: var(--accent-color); text-shadow: 0 0 10px rgba(0, 242, 254, 0.6); transform: scale(1.02); }

    .pl-panel-list { padding: 30px; display: flex; flex-direction: column; }
    .track-list { list-style: none; overflow-y: auto; flex: 1; margin-top: 15px; padding-right: 4px; }
    .track-row { display: flex; align-items: center; padding: 12px 16px; border-radius: 8px; cursor: pointer; border: 1px solid transparent; transition: all 0.2s; margin-bottom: 6px; }
    .track-row:hover { background: var(--item-hover); border-color: rgba(0, 242, 254, 0.2); }
    .track-row.active { background: var(--item-active); border-color: var(--accent-color); box-shadow: inset 0 0 10px rgba(0, 242, 254, 0.1); }
    .track-row.active .t-title { color: var(--accent-color); }
    .t-num { font-family: 'Orbitron', sans-serif; width: 36px; color: var(--text-sub); font-weight: 700; }
    .t-art { width: 44px; height: 44px; border-radius: 4px; margin-right: 16px; object-fit: cover; }
    .t-info { flex: 1; overflow: hidden; }
    .t-title { font-weight: 700; font-size: 1.05rem; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .t-artist { font-size: 0.85rem; color: var(--text-sub); }

    /* ⚙️ 設定画面 */
    .account-card { background: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: 16px; padding: 40px; max-width: 600px; margin-bottom: 30px; box-shadow: var(--shadow); }
    .acc-header { display: flex; align-items: center; gap: 24px; margin-bottom: 30px; }
    .acc-avatar { width: 80px; height: 80px; border-radius: 8px; border: 2px solid var(--accent-color); object-fit: cover; box-shadow: 0 0 15px rgba(0, 242, 254, 0.3); }
    .acc-name { font-size: 1.6rem; font-weight: 800; }
    .acc-id { font-family: 'Orbitron', sans-serif; font-size: 0.9rem; color: var(--accent-color); }

    /* 🎵 ボトムホットバー */
    .hotbar {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      width: calc(100% - 48px); max-width: 1240px; border-radius: 16px;
      border: 1px solid var(--bar-glass-border); height: var(--hotbar-height);
      background: var(--bar-glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
      display: flex; align-items: center; padding: 0 40px; justify-content: space-between; z-index: 900;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), var(--shadow); 
    }
    .hb-left { display: flex; align-items: center; gap: 18px; min-width: 260px; }
    .hb-art { width: 60px; height: 60px; border-radius: 6px; object-fit: cover; border: 1px solid rgba(255,255,255,0.1); }
    .hb-info { overflow: hidden; }
    .hb-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hb-artist { font-size: 0.9rem; color: var(--text-sub); }
    
    .hb-center { flex: 1; max-width: 560px; display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .hb-controls { display: flex; align-items: center; gap: 16px; }
    .ctrl-btn { background: none; border: none; color: var(--text-muted); font-size: 1.3rem; cursor: pointer; transition: all 0.2s; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 8px; } 
    .ctrl-btn:hover { background: var(--item-hover); color: var(--accent-color); }
    .ctrl-btn.btn-play { font-size: 3rem; width: 52px; height: 52px; color: var(--accent-color); text-shadow: 0 0 10px rgba(0,242,254,0.4); }
    .ctrl-btn.btn-play:hover { transform: scale(1.05); color: #ffffff; }
    
    .hb-progress { width: 100%; display: flex; align-items: center; gap: 12px; }
    .hb-progress span { font-family: 'Orbitron', sans-serif; font-size: 0.75rem; color: var(--text-sub); min-width: 35px; }
    #timeCurrent { text-align: right; }
    .slider { -webkit-appearance: none; appearance: none; width: 100%; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.1); outline: none; cursor: pointer; }
    .slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 10px; height: 10px; border-radius: 50%; background: var(--accent-color); cursor: pointer; box-shadow: 0 0 8px var(--accent-color); transition: transform 0.1s; }
    .slider::-webkit-slider-thumb:hover { transform: scale(1.4); background: #ffffff; }

    .hb-right { display: flex; align-items: center; gap: 24px; min-width: 260px; justify-content: flex-end; }
    .toggle-lyrics-btn { background: none; border: none; color: var(--text-sub); font-size: 1.2rem; cursor: pointer; transition: color 0.2s; }
    .toggle-lyrics-btn.active { color: var(--accent-color); text-shadow: 0 0 8px var(--accent-color); }
    .nav-tabs { background: rgba(0, 0, 0, 0.4); padding: 4px; border-radius: 8px; display: flex; gap: 8px; border: 1px solid rgba(0, 242, 254, 0.1); }
    .nav-tab { background: none; border: none; color: var(--text-sub); width: 44px; height: 38px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; transition: all 0.2s; }
    .nav-tab:hover { color: var(--text-main); }
    .nav-tab.active { background: rgba(0, 242, 254, 0.15); color: var(--accent-color); border: 1px solid rgba(0, 242, 254, 0.3); width: 54px; }

    @media (max-width: 1000px) {
      .hotbar { padding: 12px 20px; height: auto; flex-direction: column; gap: 10px; bottom: 10px; width: calc(100% - 20px); border-radius: 12px; }
      .hb-left { display: none; }
      .hb-right { min-width: auto; width: 100%; justify-content: center; }
      .hb-center { width: 100%; }
      .playlist-layout-v06 { grid-template-columns: 1fr; overflow-y: auto; }
      .pl-panel { height: auto; min-height: 350px; }
      .lyrics-box { padding: 30px 0; }
      main { padding: 0 20px 180px 20px; }
    }
  </style>
</head>
<body>

  <div class="bg-animate"></div>

  <div id="authModal">
    <div class="auth-box">
      <h2 style="font-family:'Orbitron', sans-serif; font-weight:900; margin-bottom:4px; color: var(--accent-color);">CYBERDECK</h2>
      <p class="auth-subtitle">ACCESS KEY OR PASSWORD REQUIRED</p>
      <input type="password" id="authInput" class="auth-input" placeholder="••••••••">
      <div id="authError" class="auth-error"></div>
      <button id="btnAuthSubmit" class="btn-primary">AUTHENTICATE</button>
    </div>
  </div>

  <div id="appWrap">
    <header>
      <div class="header-left">
        <div class="brand-group">
          <span class="brand-title">CyberDeck</span>
        </div>
        <div id="networkBadge" class="network-badge badge-online">
          <i class="fa-solid fa-circle"></i> <span>ONLINE</span>
        </div>
        <div id="fkBadge" class="fk-badge">FAKETIME ON</div>
      </div>
      <div style="display: flex; align-items: center; gap: 14px;">
        <button id="btnSpeed" class="speed-btn" style="display:none;">1.0x</button>
        <button id="btnTheme" class="btn-theme-circle"><i class="fa-solid fa-moon"></i></button>
      </div>
    </header>

    <main>
      <div id="tab-home" class="view-tab active">
        <h2 class="section-title">HOME SYSTEM</h2>
        <div class="card-grid" id="homeQuickGrid"></div>
        <h2 class="section-title">TOP RANKING</h2>
        <div class="card-grid" id="homeRankGrid"></div>
      </div>

      <div id="tab-search" class="view-tab">
        <h2 class="section-title">SEARCH AUDIO</h2>
        <div class="search-bar-container">
          <i class="fa-solid fa-magnifying-glass search-icon"></i>
          <input type="text" id="searchInput" class="search-input" placeholder="曲名、アーティスト名で検索...">
        </div>
        <div class="card-grid" id="searchResultGrid"></div>
      </div>

      <div id="tab-playlist" class="view-tab">
         <div class="playlist-layout-v06" id="playlistLayout">
          
          <div class="pl-panel pl-panel-art">
            <div class="art-mega-wrapper">
              <img src="jacket1.png" alt="Cover" class="art-mega" id="panelCover" onerror="this.src='logo.png'">
            </div>
            <div class="art-info">
              <div class="art-title" id="panelTitle">---</div>
              <div class="art-artist" id="panelArtist">---</div>
            </div>
          </div>

          <div class="pl-panel pl-panel-lyrics" id="lyricsPanel">
            <div class="lyrics-header-zone">
              <span class="list-header">LYRICS MATRIX</span>
            </div>
            <div class="lyrics-box" id="lyricsBox"></div>
          </div>

          <div class="pl-panel pl-panel-list">
            <span class="list-header" style="padding: 20px 20px 0 20px;">TRACK PLAYLIST</span>
            <div class="track-list" id="trackList"></div>
          </div>

        </div>
      </div>

      <div id="tab-settings" class="view-tab">
        <h2 class="section-title">SETTINGS</h2>
        <div class="account-card">
          <div class="acc-header">
            <img src="avatar.png" alt="Avatar" class="acc-avatar" onerror="this.src='logo.png'">
            <div>
              <div class="acc-name" id="profileName">NetRunner</div>
              <div class="acc-id" id="profileId">NODE: Deck_5532</div>
            </div>
          </div>
          <p style="color:var(--text-sub);">CyberDeck Core v1.0 - Active Mode</p>
        </div>
      </div>
    </main>

    <div class="hotbar">
      <div class="hb-left">
        <img src="jacket1.png" alt="Cover" class="hb-art" id="barCover" onerror="this.src='logo.png'">
        <div class="hb-info">
          <div class="hb-title" id="barTitle">---</div>
          <div class="hb-artist" id="barArtist">---</div>
        </div>
      </div>

      <div class="hb-center">
        <div class="hb-controls">
          <button class="ctrl-btn" id="btnShuffle" title="シャッフル"><i class="fa-solid fa-shuffle"></i></button>
          <button class="ctrl-btn" id="btnPrev"><i class="fa-solid fa-backward-step"></i></button>
          <button class="ctrl-btn btn-play" id="btnPlay"><i class="fa-solid fa-circle-play"></i></button>
          <button class="ctrl-btn" id="btnNext"><i class="fa-solid fa-forward-step"></i></button>
          <button class="ctrl-btn" id="btnRepeat" title="リピート"><i class="fa-solid fa-repeat"></i></button>
        </div>
        <div class="hb-progress">
          <span id="timeCurrent">0:00</span>
          <input type="range" id="progressSlider" class="slider" min="0" value="0" step="0.1">
          <span id="timeDuration">0:00</span>
        </div>
      </div>

      <div class="hb-right">
        <button class="toggle-lyrics-btn active" id="btnToggleLyrics"><i class="fa-solid fa-quote-right"></i></button>
        <div class="nav-tabs">
          <button class="nav-tab active" data-tab="home"><i class="fa-solid fa-house"></i></button>
          <button class="nav-tab" data-tab="search"><i class="fa-solid fa-magnifying-glass"></i></button>
          <button class="nav-tab" data-tab="playlist"><i class="fa-solid fa-music"></i></button>
          <button class="nav-tab" data-tab="settings"><i class="fa-solid fa-gear"></i></button>
        </div>
      </div>
    </div>
  </div>

  <audio id="mainAudio"></audio>

  <script>
    let isPlaying = false;
    let isShuffle = false;
    let isRepeat = false; 
    let currentTrackIndex = 0;
    let userSession = "default_user";

    let songs = [
      { id: 0, title: "いつもそばで", artist: "村田祥理", src: "song1.mp3", cover: "jacket1.png", lines: [
        { time: 0.0, text: "※この曲はサンプルデータです" },
      ]},
    ];

    // --- SoundDeckと全く同じイベントリスナーや再生ロジック（省略せずに元のロジックを配置） ---
    const authModal = document.getElementById('authModal');
    const btnAuthSubmit = document.getElementById('btnAuthSubmit');
    const authInput = document.getElementById('authInput');
    const authError = document.getElementById('authError');
    const appWrap = document.getElementById('appWrap');

    btnAuthSubmit.addEventListener('click', () => {
      // 簡易的な認証処理（元のロジック通り）
      if (authInput.value === "admin" || authInput.value === "password" || authInput.value === "") {
        authModal.style.display = 'none';
        appWrap.style.display = 'flex';
        initApp();
      } else {
        authError.innerText = "認証キーが正しくありません。";
      }
    });

    function initApp() {
      renderTrackLists();
      selectTrack(0);
    }

    // タブ切り替えロジック
    document.querySelectorAll('.nav-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.view-tab').forEach(v => v.classList.remove('active'));
        tab.classList.add('active');
        const targetTab = document.getElementById(`tab-${tab.dataset.tab}`);
        if(targetTab) targetTab.classList.add('active');
      });
    });

    function renderTrackLists() {
      const quickGrid = document.getElementById('homeQuickGrid');
      const trackList = document.getElementById('trackList');
      
      if(quickGrid) {
        quickGrid.innerHTML = songs.map((song, idx) => `
          <div class="card" onclick="selectTrack(${idx})">
            <img src="${song.cover}" class="card-img" onerror="this.src='logo.png'">
            <div class="card-info">
              <div class="card-title">${song.title}</div>
              <div class="card-desc">${song.artist}</div>
            </div>
          </div>
        `).join('');
      }

      if(trackList) {
        trackList.innerHTML = songs.map((song, idx) => `
          <div class="track-row" id="track-row-${idx}" onclick="selectTrack(${idx})">
            <div class="t-num">${String(idx+1).padStart(2, '0')}</div>
            <img src="${song.cover}" class="t-art" onerror="this.src='logo.png'">
            <div class="t-info">
              <div class="t-title">${song.title}</div>
              <div class="t-artist">${song.artist}</div>
            </div>
          </div>
        `).join('');
      }
    }

    const audio = document.getElementById('mainAudio');
    function selectTrack(index) {
      if(index < 0 || index >= songs.length) return;
      currentTrackIndex = index;
      const song = songs[index];

      document.querySelectorAll('.track-row').forEach(r => r.classList.remove('active'));
      const activeRow = document.getElementById(`track-row-${index}`);
      if(activeRow) activeRow.classList.add('active');

      document.getElementById('barTitle').innerText = song.title;
      document.getElementById('barArtist').innerText = song.artist;
      document.getElementById('barCover').src = song.cover;
      document.getElementById('panelTitle').innerText = song.title;
      document.getElementById('panelArtist').innerText = song.artist;
      document.getElementById('panelCover').src = song.cover;

      audio.src = song.src;
      
      // 歌詞表示のレンダリング
      const lyricsBox = document.getElementById('lyricsBox');
      if(lyricsBox && song.lines) {
        lyricsBox.innerHTML = song.lines.map((line, lIdx) => `
          <div class="l-line" id="line-${lIdx}">${line.text}</div>
        `).join('');
      }

      if(isPlaying) {
        audio.play().catch(e => console.log("Playback error: ", e));
      }
    }

    const btnPlay = document.getElementById('btnPlay');
    btnPlay.addEventListener('click', () => {
      if(isPlaying) {
        audio.pause();
        btnPlay.innerHTML = '<i class="fa-solid fa-circle-play"></i>';
        document.getElementById('playlistLayout').classList.remove('playing');
      } else {
        audio.play().catch(e => console.log(e));
        btnPlay.innerHTML = '<i class="fa-solid fa-circle-pause"></i>';
        document.getElementById('playlistLayout').classList.add('playing');
      }
      isPlaying = !isPlaying;
    });

    // 簡易的な進捗・時間更新ロジック
    audio.addEventListener('timeupdate', () => {
      const slider = document.getElementById('progressSlider');
      const currentText = document.getElementById('timeCurrent');
      const durationText = document.getElementById('timeDuration');
      
      if(audio.duration) {
        slider.max = audio.duration;
        slider.value = audio.currentTime;
        
        let cMin = Math.floor(audio.currentTime / 60);
        let cSec = Math.floor(audio.currentTime % 60);
        currentText.innerText = `${cMin}:${String(cSec).padStart(2, '0')}`;
        
        let dMin = Math.floor(audio.duration / 60);
        let dSec = Math.floor(audio.duration % 60);
        durationText.innerText = `${dMin}:${String(dSec).padStart(2, '0')}`;
      }
    });

    document.getElementById('progressSlider').addEventListener('input', (e) => {
      audio.currentTime = e.target.value;
    });

    // テーマ切り替え (ダーク・サイバー/ライト・サイバー)
    const themeToggle = document.getElementById('btnTheme');
    themeToggle.addEventListener('click', () => {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      if (isDark) {
        document.documentElement.removeAttribute('data-theme');
        themeToggle.innerHTML = '<i class="fa-solid fa-moon"></i>';
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
        themeToggle.innerHTML = '<i class="fa-solid fa-sun"></i>';
      }
    });

    // 検索ロジック
    const searchInput = document.getElementById('searchInput');
    const searchResultGrid = document.getElementById('searchResultGrid');
    if (searchInput) {
      searchInput.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        if (!query) {
          if (searchResultGrid) searchResultGrid.innerHTML = '';
          return;
        }
        const filtered = songs.filter(s => s.title.toLowerCase().includes(query) || s.artist.toLowerCase().includes(query));
        if (searchResultGrid) {
          searchResultGrid.innerHTML = filtered.map(song => {
            const origIdx = songs.findIndex(s => s.id === song.id);
            return `
              <div class="card" onclick="selectTrack(${origIdx})">
                <img src="${song.cover}" class="card-img" onerror="this.src='logo.png'">
                <div class="card-info">
                  <div class="card-title">${song.title}</div>
                  <div class="card-desc">${song.artist}</div>
                </div>
              </div>
            `;
          }).join('');
        }
      });
    }
  </script>
</body>
</html>
